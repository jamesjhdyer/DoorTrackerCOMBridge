<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Door Tracker COM Bridge</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Door Tracker COM Bridge</h1>
  <p class="subtitle">Proof of concept: NETUM NT-1228BL scanner &rarr; COM port test</p>

  <section class="controls">
    <div class="field">
      <label for="port-select">COM Port</label>
      <select id="port-select"></select>
      <button id="refresh-btn" title="Refresh port list">Refresh</button>
    </div>

    <div class="field">
      <label for="baud-select">Baud Rate</label>
      <select id="baud-select">
        <option value="1200">1200</option>
        <option value="2400">2400</option>
        <option value="4800">4800</option>
        <option value="9600">9600</option>
        <option value="19200" selected>19200</option>
        <option value="38400">38400</option>
        <option value="57600">57600</option>
        <option value="115200">115200</option>
      </select>
    </div>

    <div class="field buttons">
      <button id="connect-btn">Connect</button>
      <button id="disconnect-btn" disabled>Disconnect</button>
    </div>
  </section>

  <section class="status-bar">
    <span>Status:</span>
    <span id="status-badge" class="badge disconnected">Disconnected</span>
    <span id="status-message"></span>
  </section>

  <section class="log-section">
    <div class="log-header">
      <h2>Scan Log</h2>
      <button id="clear-log-btn">Clear Log</button>
    </div>
    <table id="log-table">
      <thead>
        <tr>
          <th>Timestamp</th>
          <th>COM Port</th>
          <th>Scanned Value</th>
        </tr>
      </thead>
      <tbody id="log-body"></tbody>
    </table>
  </section>

  <script src="renderer.js"></script>
</body>
</html>
